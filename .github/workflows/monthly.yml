name: Monthly ECDC extraction

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping extraction endpoint
        run: |
          response=$(curl -s "https://samridhaggarwal-ecdc-api.hf.space/run?key=${{ secrets.RUN_SECRET }}")
          echo "$response"

name: Monthly ECDC extraction

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python extract.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
